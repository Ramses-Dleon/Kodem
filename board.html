<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kódem — Tablero en Vivo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a12; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; padding: 12px; }
  h1 { font-size: 1.3rem; color: #f59e0b; text-align: center; margin-bottom: 6px; }
  #turnInfo { background: #1a1a2e; border: 1px solid #f59e0b; border-radius: 8px; padding: 6px 14px; margin: 0 auto 10px; font-size: 0.85rem; text-align: center; max-width: 960px; }
  .board { display: flex; flex-direction: column; gap: 10px; max-width: 960px; margin: 0 auto; }
  .player-side { background: #12121e; border-radius: 12px; padding: 14px; border: 2px solid #333; }
  .player-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .player-name { font-weight: bold; font-size: 1rem; }
  .ext-count { background: #dc2626; color: white; border-radius: 12px; padding: 2px 10px; font-size: 0.8rem; font-weight: bold; }
  .field-row { display: flex; gap: 12px; align-items: flex-start; justify-content: center; flex-wrap: wrap; }
  .card-slot { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .zone-label { font-size: 0.6rem; color: #888; text-transform: uppercase; text-align: center; margin-bottom: 2px; }
  .card-frame {
    width: 140px; height: 196px; border-radius: 8px; position: relative;
    overflow: visible; border: 3px solid #333; background: #111; cursor: pointer;
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .card-frame:hover { box-shadow: 0 0 16px rgba(245,158,11,0.4); z-index: 5; }
  .card-frame img { width: 100%; height: 100%; object-fit: cover; border-radius: 5px; }
  .rest-1 { transform: rotate(90deg); margin: 28px 0; }
  .rest-2 { transform: rotate(180deg); }
  .rest-3 { transform: rotate(180deg); }
  .rest-3 img { display: none; }
  .rest-3::after { content: '🎴'; font-size: 2.5rem; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); opacity: 0.4; }
  .rest-1:hover { transform: rotate(90deg) scale(1.05); }
  .hidden-card { background: linear-gradient(135deg, #0d1b2a, #1b2838); border-color: #444; display: flex; align-items: center; justify-content: center; }
  .card-back { font-size: 2.5rem; opacity: 0.3; }
  .e-chaak { border-color: #facc15; } .e-piric { border-color: #ef4444; } .e-feral { border-color: #a855f7; }
  .e-demo { border-color: #6b7280; } .e-gelid { border-color: #38bdf8; } .e-huumic { border-color: #22c55e; }
  .e-litic { border-color: #d97706; } .e-atlic { border-color: #3b82f6; }
  .dice { display: none; }
  .hp-bar { position: absolute; bottom: 3px; left: 4px; right: 4px; display: flex; gap: 2px; z-index: 2; }
  .hp { flex: 1; height: 5px; border-radius: 2px; background: #22c55e; }
  .hp.lost { background: #dc262633; }
  .hp.crit { background: #dc2626; animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: 0.5; } }
  .rest-dots { position: absolute; top: -8px; left: -4px; display: flex; gap: 3px; z-index: 3; }
  .rdot { width: 10px; height: 10px; border-radius: 50%; background: #f59e0b; border: 1px solid rgba(255,255,255,0.3); box-shadow: 0 0 4px #f59e0b88; }
  .equip-under { display: flex; gap: 3px; justify-content: center; flex-wrap: wrap; }
  .equip-chip {
    font-size: 0.6rem; background: #1a1a2e; border: 1px solid; border-radius: 4px;
    padding: 3px 8px; color: #ccc; cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .equip-chip:hover { transform: scale(1.1); box-shadow: 0 0 8px rgba(245,158,11,0.5); z-index: 10; }
  .equip-chip.rot { border-color: #d97706; color: #fbbf24; }
  .equip-chip.ixim { border-color: #22c55e; color: #86efac; }
  .equip-chip.bio { border-color: #3b82f6; color: #93c5fd; }
  .side-zone { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 100px; }
  .prot-frame { width: 100px; height: 140px; }
  .ext-cards { display: flex; flex-direction: column; gap: 4px; align-items: center; }
  .ext-mini { width: 70px; height: 98px; border-color: #dc262666; opacity: 0.6; cursor: pointer; }
  .ext-mini img { filter: grayscale(0.5); }
  .ext-skull { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 1.5rem; text-shadow: 0 0 8px black; }
  .ext-label { font-size: 0.5rem; color: #f87171; text-align: center; }
  .bottom-row { display: flex; gap: 6px; justify-content: center; align-items: center; margin-top: 8px; flex-wrap: wrap; }
  .info-chip { font-size: 0.6rem; background: #1a1a2e; border: 1px solid #333; border-radius: 4px; padding: 3px 8px; color: #888; cursor: pointer; transition: all 0.2s; }
  .info-chip:hover { transform: scale(1.05); box-shadow: 0 0 6px rgba(245,158,11,0.3); }
  .info-chip.bio { border-color: #3b82f6; color: #93c5fd; }
  .mazo-chip { cursor: default; }
  .mazo-chip:hover { transform: none; box-shadow: none; }
  .divider { height: 2px; background: linear-gradient(90deg, transparent, #f59e0b33, transparent); margin: 2px 0; }

  /* Popup */
  .popup-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
  .popup-overlay.active { display: flex; }
  .popup { background: #1a1a2e; border: 2px solid #f59e0b; border-radius: 12px; max-width: 420px; width: 90%; max-height: 90vh; overflow-y: auto; position: relative; }
  .popup-close { position: absolute; top: 8px; right: 12px; font-size: 1.5rem; color: #888; cursor: pointer; z-index: 5; background: #1a1a2e; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border: 1px solid #333; }
  .popup-close:hover { color: #f59e0b; border-color: #f59e0b; }
  .popup-img { width: 100%; display: flex; justify-content: center; padding: 16px 16px 8px; background: linear-gradient(180deg, #0d0d15, #1a1a2e); }
  .popup-img img { max-width: 200px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
  .popup-body { padding: 12px 16px 16px; }
  .popup-name { font-size: 1.1rem; font-weight: bold; color: #f59e0b; margin-bottom: 4px; }
  .popup-folio { font-size: 0.75rem; color: #666; margin-bottom: 8px; }
  .popup-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
  .popup-tag { font-size: 0.7rem; padding: 2px 8px; border-radius: 4px; border: 1px solid #444; color: #ccc; background: #0d0d15; }
  .popup-stats { display: flex; gap: 16px; margin-bottom: 8px; }
  .popup-stat { font-size: 0.85rem; font-weight: bold; }
  .popup-effect-type { font-size: 0.7rem; color: #f59e0b; font-weight: bold; margin-bottom: 4px; }
  .popup-effect { font-size: 0.8rem; color: #ddd; line-height: 1.4; margin-bottom: 6px; }
  .popup-cost { font-size: 0.75rem; color: #f87171; line-height: 1.3; padding: 6px; background: #dc262615; border-radius: 4px; border: 1px solid #dc262633; margin-bottom: 6px; }
  .popup-cost-label { font-size: 0.65rem; color: #dc2626; font-weight: bold; margin-bottom: 2px; }
  .popup-status { margin-top: 8px; padding: 6px; border-radius: 4px; font-size: 0.75rem; }
  .popup-status.alive { background: #22c55e15; border: 1px solid #22c55e33; color: #86efac; }
  .popup-status.dead { background: #dc262615; border: 1px solid #dc262633; color: #f87171; }
  .popup-status.hidden-s { background: #f59e0b15; border: 1px solid #f59e0b33; color: #fbbf24; }
  .popup-flavor { font-size: 0.7rem; color: #666; font-style: italic; margin-top: 8px; }
  .popup-artist { font-size: 0.6rem; color: #555; margin-top: 4px; }
</style>
</head>
<body>

<h1>🎴 Kódem TCG — Partida en Vivo</h1>
<div id="turnInfo"></div>
<div class="board" id="board"></div>

<!-- Popup -->
<div class="popup-overlay" id="popupOverlay" onclick="closePopup()">
  <div class="popup" onclick="event.stopPropagation()">
    <div class="popup-close" onclick="closePopup()">✕</div>
    <div class="popup-img"><img id="popupImg" src="" alt=""></div>
    <div class="popup-body">
      <div class="popup-name" id="popupName"></div>
      <div class="popup-folio" id="popupFolio"></div>
      <div class="popup-meta" id="popupMeta"></div>
      <div class="popup-stats" id="popupStats"></div>
      <div class="popup-effect-type" id="popupEffectType"></div>
      <div class="popup-effect" id="popupEffect"></div>
      <div id="popupCostWrap" style="display:none">
        <div class="popup-cost"><div class="popup-cost-label">⚠️ Costo</div><span id="popupCost"></span></div>
      </div>
      <div class="popup-status" id="popupStatus"></div>
      <div class="popup-flavor" id="popupFlavor"></div>
      <div class="popup-artist" id="popupArtist"></div>
    </div>
  </div>
</div>

<script>
let CARDS = {};
let STATE = {};

const ENERGY_MAP = {
  'Cháaktica': { emoji: '⚡', css: 'e-chaak', color: '#facc15' },
  'Pírica': { emoji: '🔥', css: 'e-piric', color: '#ef4444' },
  'Feral': { emoji: '🐾', css: 'e-feral', color: '#a855f7' },
  'Demótica': { emoji: '👻', css: 'e-demo', color: '#6b7280' },
  'Gélida': { emoji: '❄️', css: 'e-gelid', color: '#38bdf8' },
  'Húumica': { emoji: '🌿', css: 'e-huumic', color: '#22c55e' },
  'Lítica': { emoji: '🪨', css: 'e-litic', color: '#d97706' },
  'Átlica': { emoji: '💧', css: 'e-atlic', color: '#3b82f6' }
};
const TYPE_EMOJI = { 'Adendei':'🦎','Rava':'👑','Espectro':'👻','Protector':'🛡️','Ixim':'🌽','Rot':'🪨','Bio':'🌿' };

async function init() {
  const [cardsData, stateData] = await Promise.all([
    fetch('cards.json').then(r => r.json()),
    fetch('game-state.json?t=' + Date.now()).then(r => r.json())
  ]);
  cardsData.forEach(c => CARDS[c.folio] = c);
  STATE = stateData;
  render();
}

function render() {
  const s = STATE;
  document.getElementById('turnInfo').innerHTML =
    `Turno <strong>${s.turn}</strong> — ${s.phase} · Extinción: Alpha ${s.alpha.extinction}/10 · Beta ${s.beta.extinction}/10`;
  
  const board = document.getElementById('board');
  board.innerHTML = renderPlayer(s.alpha, 'alpha') +
    '<div class="divider"></div>' +
    renderPlayer(s.beta, 'beta');
}

function renderPlayer(p, side) {
  const borderClass = side === 'alpha' ? 'border-color:#f59e0b44' : 'border-color:#8b5cf644';
  
  let html = `<div class="player-side" style="${borderClass}">`;
  html += `<div class="player-header">
    <span class="player-name" style="color:${p.color}">${p.emoji} ${p.name} — ${p.deck}</span>
    <span class="ext-count">💀 ${p.extinction}/10</span>
  </div>`;
  
  html += '<div class="field-row">';
  
  // Protector
  html += '<div class="side-zone"><div class="zone-label">Protector</div>';
  const pr = p.protector;
  const prRestClass = pr.rests >= 3 ? 'rest-3' : pr.rests === 2 ? 'rest-2' : pr.rests === 1 ? 'rest-1' : '';
  html += `<div class="card-frame prot-frame hidden-card ${prRestClass}" onclick="showCard('${pr.folio}','hidden',${pr.hp},${pr.rests})">`;
  html += `<span class="card-back">🛡️</span>`;
  if (pr.rests > 0) {
    html += '<div class="rest-dots">' + '<div class="rdot"></div>'.repeat(pr.rests) + '</div>';
  }
  html += `</div><div style="font-size:0.55rem;color:#666">${pr.name}</div></div>`;
  
  // Field cards
  p.field.forEach(card => {
    html += '<div class="card-slot">';
    html += `<div class="zone-label">Pos ${card.pos}</div>`;
    
    if (card.revealed) {
      const eMap = ENERGY_MAP[card.energy] || { css: '', color: '#888' };
      const restClass = card.rests >= 3 ? 'rest-3' : card.rests === 2 ? 'rest-2' : card.rests === 1 ? 'rest-1' : '';
      html += `<div class="card-frame ${eMap.css} ${restClass}" onclick="showCard('${card.folio}','alive',${card.hp},${card.rests})">`;
      html += `<img src="images/${card.folio}.webp" alt="${card.name}">`;
      if (card.rests > 0) {
        html += '<div class="rest-dots">' + '<div class="rdot"></div>'.repeat(card.rests) + '</div>';
      }
      // HP bar
      html += '<div class="hp-bar">';
      for (let i = 0; i < card.maxHp; i++) {
        if (i < card.hp) {
          html += card.hp <= 2 ? '<div class="hp crit"></div>' : '<div class="hp"></div>';
        } else {
          html += '<div class="hp lost"></div>';
        }
      }
      html += '</div></div>';
    } else {
      html += `<div class="card-frame hidden-card" onclick="showCard('${card.folio}','hidden',${card.hp},0)">`;
      html += '<span class="card-back">🎴</span></div>';
      html += `<div style="font-size:0.5rem;color:#555">Oculta</div>`;
    }
    
    // Equips under card
    if (card.equips && card.equips.length > 0) {
      html += '<div class="equip-under">';
      card.equips.forEach(eq => {
        const eqClass = eq.type === 'Rot' ? 'rot' : eq.type === 'Ixim' ? 'ixim' : 'bio';
        const eqEmoji = eq.type === 'Rot' ? '🪨' : eq.type === 'Ixim' ? '🌽' : '🌿';
        html += `<div class="equip-chip ${eqClass}" onclick="showCard('${eq.folio}','equip');event.stopPropagation()">${eqEmoji} ${eq.name}</div>`;
      });
      html += '</div>';
    }
    
    html += '</div>';
  });
  
  // Extinction
  html += '<div class="side-zone"><div class="zone-label">Extinción</div>';
  if (p.extinctionCards.length === 0) {
    html += '<div style="font-size:2.5rem;color:#222;margin:16px 0">☠️</div>';
    html += '<div style="font-size:0.6rem;color:#444">Vacía</div>';
  } else {
    html += '<div class="ext-cards">';
    p.extinctionCards.forEach(ec => {
      html += `<div class="card-frame ext-mini" onclick="showCard('${ec.folio}','dead')">`;
      html += `<img src="images/${ec.folio}.webp" alt="${ec.name}"><div class="ext-skull">💀</div></div>`;
      html += `<div class="ext-label">${ec.name.split(',')[0]}</div>`;
    });
    html += '</div>';
  }
  html += '</div></div>';
  
  // Bottom row
  html += '<div class="bottom-row">';
  if (p.bio) {
    const bioLabel = p.bio.name + (p.bio.revealed ? ' (revelada)' : '');
    html += `<div class="info-chip bio" onclick="showCard('${p.bio.folio}','equip')">🌿 ${bioLabel}</div>`;
  }
  p.equipZone.forEach(eq => {
    const eqColor = eq.type === 'Rot' ? 'border-color:#d97706;color:#fbbf24' : 'border-color:#22c55e;color:#86efac';
    const eqEmoji = eq.type === 'Rot' ? '🪨' : '🌽';
    html += `<div class="info-chip" style="${eqColor}" onclick="showCard('${eq.folio}','equip')">${eqEmoji} ${eq.name}</div>`;
  });
  html += `<div class="info-chip mazo-chip">📦 Mazo: ${p.mazo}</div>`;
  html += '</div></div>';
  
  return html;
}

function showCard(folio, status, currentHP, currentRests) {
  const card = CARDS[folio];
  if (!card) return;
  
  document.getElementById('popupImg').src = card.image || '';
  document.getElementById('popupName').textContent = card.name || folio;
  document.getElementById('popupFolio').textContent = `${card.folio} · ${card.set}`;
  
  const meta = document.getElementById('popupMeta');
  meta.innerHTML = '';
  if (card.type) {
    const t = document.createElement('span');
    t.className = 'popup-tag';
    t.textContent = (TYPE_EMOJI[card.type] || '') + ' ' + card.type;
    meta.appendChild(t);
  }
  [card.energy, card.energy2].filter(Boolean).forEach(en => {
    const e = document.createElement('span');
    e.className = 'popup-tag';
    const em = ENERGY_MAP[en] || {};
    e.textContent = (em.emoji || '') + ' ' + en;
    e.style.borderColor = em.color || '#444';
    e.style.color = em.color || '#ccc';
    meta.appendChild(e);
  });
  
  const stats = document.getElementById('popupStats');
  stats.innerHTML = '';
  if (card.damage != null) stats.innerHTML += `<span class="popup-stat">⚔️ ${card.damage}</span>`;
  if (card.rests != null) stats.innerHTML += `<span class="popup-stat">💤 ${card.rests}</span>`;
  if (currentHP !== undefined) stats.innerHTML += `<span class="popup-stat" style="color:#22c55e">❤️ ${currentHP} PV</span>`;
  
  const et = document.getElementById('popupEffectType');
  et.textContent = card.effect_type || '';
  et.style.display = card.effect_type ? 'block' : 'none';
  document.getElementById('popupEffect').textContent = card.effect_text || '';
  
  const costWrap = document.getElementById('popupCostWrap');
  if (card.cost_text) {
    costWrap.style.display = 'block';
    document.getElementById('popupCost').textContent = card.cost_text;
  } else {
    costWrap.style.display = 'none';
  }
  
  const statusEl = document.getElementById('popupStatus');
  if (status === 'dead') { statusEl.className = 'popup-status dead'; statusEl.textContent = '💀 En Extinción'; }
  else if (status === 'hidden') { statusEl.className = 'popup-status hidden-s'; let t = '🎴 Oculta'; if (currentRests) t += ` · ${currentRests} descanso${currentRests>1?'s':''}`; statusEl.textContent = t; }
  else if (status === 'alive') { statusEl.className = 'popup-status alive'; let t = '✅ En campo'; if (currentRests) t += ` · ${currentRests} descanso${currentRests>1?'s':''}`; else t += ' · Disponible'; statusEl.textContent = t; }
  else { statusEl.className = 'popup-status'; statusEl.textContent = '🔧 Equipo'; }
  
  document.getElementById('popupFlavor').textContent = card.flavor_text || '';
  document.getElementById('popupArtist').textContent = card.artist ? '🎨 ' + card.artist : '';
  document.getElementById('popupOverlay').classList.add('active');
}

function closePopup() { document.getElementById('popupOverlay').classList.remove('active'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePopup(); });

init();
</script>
</body>
</html>
