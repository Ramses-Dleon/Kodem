<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Mapa de Sinergias — Kódem TCG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f0f;color:#e0e0e0;font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden}
header{background:#1a1a1a;padding:12px 20px;display:flex;align-items:center;gap:16px;border-bottom:1px solid #333}
header a{color:#f59e0b;text-decoration:none;font-size:14px}
header h1{font-family:'Cinzel',serif;font-size:1.2rem;color:#fff}
header small{color:#888;font-size:0.8rem}
.layout{display:flex;flex-direction:column;align-items:center;padding:16px}
.hint{text-align:center;color:#888;font-size:0.8rem;margin-bottom:12px;background:#1a1a1a;padding:6px 16px;border-radius:20px;display:inline-block}
.map-wrap{position:relative;width:100%;max-width:900px;background:#141414;border-radius:16px;border:1px solid #2a2a2a}
.map-wrap svg{width:100%;height:auto;display:block}
/* nodes */
.node-circle{cursor:pointer;transition:filter .2s}
.node-group:hover .node-circle,.node-group.active .node-circle{filter:drop-shadow(0 0 18px currentColor)}
.node-label{font-family:'Cinzel',serif;fill:#fff;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;pointer-events:none}
.node-role{font-family:'Outfit',sans-serif;fill:#aaa;font-size:9px;pointer-events:none}
.node-emoji{pointer-events:none;user-select:none}
/* arrows */
.arrow-counter{fill:none;stroke-width:3;opacity:0.7;transition:opacity .2s}
.arrow-synergy{fill:none;stroke:#f59e0b;stroke-width:2.5;stroke-dasharray:10 6;opacity:0.5;transition:opacity .2s}
.arrow-label{font-family:'Outfit',sans-serif;font-size:9px;fill:#e0e0e0;pointer-events:none;paint-order:stroke;stroke:#0f0f0f;stroke-width:3px;stroke-linecap:round;stroke-linejoin:round;font-weight:500}
.arrow-synergy-label{font-family:'Outfit',sans-serif;font-size:9px;fill:#fbbf24;pointer-events:none;paint-order:stroke;stroke:#0f0f0f;stroke-width:3px;stroke-linecap:round;stroke-linejoin:round;font-weight:500}
/* highlight */
.node-group.dimmed{opacity:0.12}
.arrow-counter.dimmed,.arrow-synergy.dimmed{opacity:0.05}
.arrow-counter.highlight{opacity:1;stroke-width:4}
.arrow-synergy.highlight{opacity:1;stroke-width:3.5}
/* panel */
#detail-panel{display:none;background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:20px;margin-top:16px;width:100%;max-width:900px}
#detail-panel.open{display:block}
#detail-panel h2{font-family:'Cinzel',serif;font-size:1.1rem;margin-bottom:8px}
#detail-panel .role{color:#888;font-size:0.85rem;margin-bottom:12px}
#detail-panel .desc{font-size:0.9rem;line-height:1.5;margin-bottom:12px}
#detail-panel .connections{font-size:0.85rem}
#detail-panel .conn-item{padding:4px 0;border-bottom:1px solid #222}
#detail-panel .conn-counter{color:#ef4444}
#detail-panel .conn-synergy{color:#f59e0b}
/* legend */
.legend{display:flex;gap:24px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:8px;font-size:0.8rem;color:#aaa}
.legend-line{width:40px;height:3px;border-radius:2px}
.legend-counter{background:linear-gradient(90deg,#ef4444,#f59e0b)}
.legend-synergy{background:#f59e0b;background:repeating-linear-gradient(90deg,#f59e0b 0,#f59e0b 8px,transparent 8px,transparent 14px)}
/* responsive */
@media(max-width:600px){
  header h1{font-size:1rem}
  .node-label{font-size:9px}
  .node-role{font-size:7px}
  .arrow-label,.arrow-synergy-label{font-size:7px}
}
/* animation */
@keyframes dash{to{stroke-dashoffset:-32}}
.arrow-counter{animation:dash 2s linear infinite}
.arrow-counter{stroke-dasharray:16 8}
</style>
</head>
<body>
<header>
  <a href="index.html">← Volver</a>
  <div><h1>⚡ Mapa de Sinergias</h1><small>Kódem TCG — 8 Energías</small></div>
</header>

<div class="layout">
  <div class="hint">Hover: resalta conexiones · Clic: ficha completa</div>

  <div class="map-wrap">
    <svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="g-atlica"><stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3"/><stop offset="100%" stop-color="#3b82f6" stop-opacity="0.08"/></radialGradient>
        <radialGradient id="g-pirica"><stop offset="0%" stop-color="#ef4444" stop-opacity="0.3"/><stop offset="100%" stop-color="#ef4444" stop-opacity="0.08"/></radialGradient>
        <radialGradient id="g-gelida"><stop offset="0%" stop-color="#06b6d4" stop-opacity="0.3"/><stop offset="100%" stop-color="#06b6d4" stop-opacity="0.08"/></radialGradient>
        <radialGradient id="g-litica"><stop offset="0%" stop-color="#b45309" stop-opacity="0.3"/><stop offset="100%" stop-color="#b45309" stop-opacity="0.08"/></radialGradient>
        <radialGradient id="g-chaaktica"><stop offset="0%" stop-color="#eab308" stop-opacity="0.3"/><stop offset="100%" stop-color="#eab308" stop-opacity="0.08"/></radialGradient>
        <radialGradient id="g-huumica"><stop offset="0%" stop-color="#a855f7" stop-opacity="0.3"/><stop offset="100%" stop-color="#a855f7" stop-opacity="0.08"/></radialGradient>
        <radialGradient id="g-demotica"><stop offset="0%" stop-color="#9ca3af" stop-opacity="0.3"/><stop offset="100%" stop-color="#9ca3af" stop-opacity="0.08"/></radialGradient>
        <radialGradient id="g-feral"><stop offset="0%" stop-color="#22c55e" stop-opacity="0.3"/><stop offset="100%" stop-color="#22c55e" stop-opacity="0.08"/></radialGradient>
        <!-- arrow markers -->
        <marker id="ah-red" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L0,8 L8,4Z" fill="#ef4444"/></marker>
        <marker id="ah-blue" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L0,8 L8,4Z" fill="#3b82f6"/></marker>
        <marker id="ah-cyan" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L0,8 L8,4Z" fill="#06b6d4"/></marker>
        <marker id="ah-brown" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L0,8 L8,4Z" fill="#b45309"/></marker>
        <marker id="ah-yellow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L0,8 L8,4Z" fill="#eab308"/></marker>
        <marker id="ah-purple" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L0,8 L8,4Z" fill="#a855f7"/></marker>
        <marker id="ah-gray" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L0,8 L8,4Z" fill="#9ca3af"/></marker>
        <marker id="ah-green" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L0,8 L8,4Z" fill="#22c55e"/></marker>
      </defs>

      <!-- COUNTER ARROWS (solid, colored by attacker) -->
      <!-- Feral → Feral (self-loop, compact arc above node) -->
      <path class="arrow-counter" data-from="feral" data-to="feral" stroke="#22c55e" marker-end="url(#ah-green)"
            d="M250,178 C270,100 340,100 290,175"/>
      <text class="arrow-label" x="285" y="110" fill="#22c55e">Auto-buff ↻</text>

      <!-- Húumica → Demótica -->
      <path class="arrow-counter" data-from="huumica" data-to="demotica" stroke="#a855f7" marker-end="url(#ah-purple)"
            d="M645,210 Q720,360 660,470"/>
      <text class="arrow-label" x="700" y="350">Escala &gt; Control</text>

      <!-- Demótica → Feral -->
      <path class="arrow-counter" data-from="demotica" data-to="feral" stroke="#9ca3af" marker-end="url(#ah-gray)"
            d="M620,490 Q440,350 285,265"/>
      <text class="arrow-label" x="460" y="350">Manipula buffs</text>

      <!-- Pírica → Feral -->
      <path class="arrow-counter" data-from="pirica" data-to="feral" stroke="#ef4444" marker-end="url(#ah-red)"
            d="M135,405 Q160,340 210,285"/>
      <text class="arrow-label" x="118" y="350">Quema &gt; Buff</text>

      <!-- Cháaktica → Lítica -->
      <path class="arrow-counter" data-from="chaaktica" data-to="litica" stroke="#eab308" marker-end="url(#ah-yellow)"
            d="M580,650 Q420,680 280,640"/>
      <text class="arrow-label" x="410" y="695">Burst &gt; Tanque</text>

      <!-- Lítica → Átlica -->
      <path class="arrow-counter" data-from="litica" data-to="atlica" stroke="#b45309" marker-end="url(#ah-brown)"
            d="M235,590 Q280,400 370,170"/>
      <text class="arrow-label" x="270" y="420">Resiste curaciones</text>

      <!-- Gélida → Cháaktica -->
      <path class="arrow-counter" data-from="gelida" data-to="chaaktica" stroke="#06b6d4" marker-end="url(#ah-cyan)"
            d="M445,730 Q520,720 565,680"/>
      <text class="arrow-label" x="480" y="745">Congela velocidad</text>

      <!-- Átlica → Pírica -->
      <path class="arrow-counter" data-from="atlica" data-to="pirica" stroke="#3b82f6" marker-end="url(#ah-blue)"
            d="M355,165 Q220,290 145,405"/>
      <text class="arrow-label" x="225" y="275">Cura &gt; Daño</text>

      <!-- SYNERGY LINES (dashed, gold) -->
      <path class="arrow-synergy" data-a="pirica" data-b="chaaktica"
            d="M165,500 Q400,550 560,640"/>
      <text class="arrow-synergy-label" x="350" y="540">🔥⚡ Aggro imparable</text>

      <path class="arrow-synergy" data-a="feral" data-b="chaaktica"
            d="M260,275 Q420,480 555,625"/>
      <text class="arrow-synergy-label" x="385" y="450">🐾⚡ Buff + velocidad</text>

      <path class="arrow-synergy" data-a="demotica" data-b="feral"
            d="M620,475 Q430,310 280,255"/>
      <text class="arrow-synergy-label" x="450" y="320">🔮🐾 Control + auto-buff</text>

      <path class="arrow-synergy" data-a="demotica" data-b="atlica"
            d="M630,470 Q530,300 420,160"/>
      <text class="arrow-synergy-label" x="550" y="290">🔮💧 Posición + defensa</text>

      <!-- NODES -->
      <!-- Átlica (top center) -->
      <g class="node-group" data-id="atlica">
        <circle cx="400" cy="120" r="60" fill="url(#g-atlica)" stroke="#3b82f6" stroke-width="2.5" class="node-circle" style="color:#3b82f6"/>
        <text class="node-emoji" x="400" y="115" text-anchor="middle" dominant-baseline="middle" font-size="28">💧</text>
        <text class="node-label" x="400" y="148" text-anchor="middle">ÁTLICA</text>
        <text class="node-role" x="400" y="195" text-anchor="middle">Defensiva</text>
      </g>
      <!-- Húumica (top right) -->
      <g class="node-group" data-id="huumica">
        <circle cx="640" cy="200" r="60" fill="url(#g-huumica)" stroke="#a855f7" stroke-width="2.5" class="node-circle" style="color:#a855f7"/>
        <text class="node-emoji" x="640" y="195" text-anchor="middle" dominant-baseline="middle" font-size="28">🌀</text>
        <text class="node-label" x="640" y="228" text-anchor="middle">HÚUMICA</text>
        <text class="node-role" x="640" y="275" text-anchor="middle">Progresiva</text>
      </g>
      <!-- Demótica (right) -->
      <g class="node-group" data-id="demotica">
        <circle cx="680" cy="500" r="60" fill="url(#g-demotica)" stroke="#9ca3af" stroke-width="2.5" class="node-circle" style="color:#9ca3af"/>
        <text class="node-emoji" x="680" y="495" text-anchor="middle" dominant-baseline="middle" font-size="28">🔮</text>
        <text class="node-label" x="680" y="528" text-anchor="middle">DEMÓTICA</text>
        <text class="node-role" x="680" y="575" text-anchor="middle">Posicional</text>
      </g>
      <!-- Cháaktica (bottom right) -->
      <g class="node-group" data-id="chaaktica">
        <circle cx="590" cy="650" r="60" fill="url(#g-chaaktica)" stroke="#eab308" stroke-width="2.5" class="node-circle" style="color:#eab308"/>
        <text class="node-emoji" x="590" y="645" text-anchor="middle" dominant-baseline="middle" font-size="28">⚡</text>
        <text class="node-label" x="590" y="678" text-anchor="middle">CHÁAKTICA</text>
        <text class="node-role" x="590" y="725" text-anchor="middle">Velocidad</text>
      </g>
      <!-- Gélida (bottom center) -->
      <g class="node-group" data-id="gelida">
        <circle cx="400" cy="730" r="60" fill="url(#g-gelida)" stroke="#06b6d4" stroke-width="2.5" class="node-circle" style="color:#06b6d4"/>
        <text class="node-emoji" x="400" y="725" text-anchor="middle" dominant-baseline="middle" font-size="28">🧊</text>
        <text class="node-label" x="400" y="758" text-anchor="middle">GÉLIDA</text>
        <text class="node-role" x="400" y="790" text-anchor="middle">Control</text>
      </g>
      <!-- Lítica (bottom left) -->
      <g class="node-group" data-id="litica">
        <circle cx="210" cy="630" r="60" fill="url(#g-litica)" stroke="#b45309" stroke-width="2.5" class="node-circle" style="color:#b45309"/>
        <text class="node-emoji" x="210" y="625" text-anchor="middle" dominant-baseline="middle" font-size="28">🪨</text>
        <text class="node-label" x="210" y="658" text-anchor="middle">LÍTICA</text>
        <text class="node-role" x="210" y="705" text-anchor="middle">Tanque</text>
      </g>
      <!-- Pírica (left) -->
      <g class="node-group" data-id="pirica">
        <circle cx="120" cy="460" r="60" fill="url(#g-pirica)" stroke="#ef4444" stroke-width="2.5" class="node-circle" style="color:#ef4444"/>
        <text class="node-emoji" x="120" y="455" text-anchor="middle" dominant-baseline="middle" font-size="28">🔥</text>
        <text class="node-label" x="120" y="488" text-anchor="middle">PÍRICA</text>
        <text class="node-role" x="120" y="535" text-anchor="middle">Agresiva</text>
      </g>
      <!-- Feral (top left — moved right to avoid clipping) -->
      <g class="node-group" data-id="feral">
        <circle cx="230" cy="230" r="55" fill="url(#g-feral)" stroke="#22c55e" stroke-width="2.5" class="node-circle" style="color:#22c55e"/>
        <text class="node-emoji" x="230" y="225" text-anchor="middle" dominant-baseline="middle" font-size="26">🐾</text>
        <text class="node-label" x="230" y="253" text-anchor="middle">FERAL</text>
        <text class="node-role" x="230" y="298" text-anchor="middle">Auto-buff</text>
      </g>
    </svg>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-line legend-counter"></div> Contador — quién vence a quién</div>
    <div class="legend-item"><div class="legend-line legend-synergy"></div> Sinergia — combo poderoso</div>
    <div class="legend-item" style="color:#666">Hover: resalta | Clic: ficha</div>
  </div>

  <div id="detail-panel"></div>
</div>

<script>
(function(){
var DATA={
  atlica:{e:'💧',n:'Átlica',c:'#3b82f6',role:'Defensiva',desc:'Curación, protección, resistencia. Los Adendei Átlicos son los médicos del campo — curan aliados y absorben daño. Contrarrestan a Pírica apagando sus quemaduras.'},
  huumica:{e:'🌀',n:'Húumica',c:'#a855f7',role:'Progresiva',desc:'Escalado y evolución. Empiezan débiles pero crecen cada turno. Contrarrestan a Demótica porque no puedes controlar lo que escala más rápido que tú.'},
  demotica:{e:'🔮',n:'Demótica',c:'#9ca3af',role:'Posicional',desc:'Control de campo y manipulación. Mueven cartas, niegan efectos, cambian posiciones. Contrarrestan a Feral manipulando sus buffs en su contra.'},
  chaaktica:{e:'⚡',n:'Cháaktica',c:'#eab308',role:'Velocidad',desc:'Ataques rápidos y burst damage. Golpean antes de que el rival pueda reaccionar. Contrarrestan a Lítica porque la velocidad supera a la resistencia bruta.'},
  gelida:{e:'🧊',n:'Gélida',c:'#06b6d4',role:'Control',desc:'Congelamiento y ralentización. Ponen descansos extra, congelan ataques. Contrarrestan a Cháaktica frenando su velocidad.'},
  litica:{e:'🪨',n:'Lítica',c:'#b45309',role:'Tanque',desc:'Alta vida y resistencia pura. Aguantan todo el daño y siguen en pie. Contrarrestan a Átlica porque no necesitan curarse si no pueden ser derribados.'},
  pirica:{e:'🔥',n:'Pírica',c:'#ef4444',role:'Agresiva',desc:'Daño directo y quemaduras. Eliminan amenazas rápidamente con daño masivo. Contrarrestan a Feral quemándolos más rápido de lo que se buffean.'},
  feral:{e:'🐾',n:'Feral',c:'#22c55e',role:'Auto-buff',desc:'Crecimiento propio y feralización. Se fortalecen a sí mismos acumulando poder. Se counter a sí mismos: Feral vs Feral es puro espejo de quién escala mejor.'}
};

var COUNTERS=[
  {f:'feral',t:'feral',l:'Auto-buff (espejo)'},
  {f:'huumica',t:'demotica',l:'Escala > Control'},
  {f:'demotica',t:'feral',l:'Manipula buffs'},
  {f:'pirica',t:'feral',l:'Quema > Buff'},
  {f:'chaaktica',t:'litica',l:'Burst > Tanque'},
  {f:'litica',t:'atlica',l:'Resiste curaciones'},
  {f:'gelida',t:'chaaktica',l:'Congela velocidad'},
  {f:'atlica',t:'pirica',l:'Cura > Daño'}
];

var SYNERGIES=[
  {a:'pirica',b:'chaaktica',l:'🔥⚡ Aggro imparable'},
  {a:'feral',b:'chaaktica',l:'🐾⚡ Buff + velocidad'},
  {a:'demotica',b:'feral',l:'🔮🐾 Control + auto-buff'},
  {a:'demotica',b:'atlica',l:'🔮💧 Posición + defensa'}
];

var nodes=document.querySelectorAll('.node-group');
var counterPaths=document.querySelectorAll('.arrow-counter');
var synergyPaths=document.querySelectorAll('.arrow-synergy');
var panel=document.getElementById('detail-panel');
var activeId=null;

function connectedIds(id){
  var ids=new Set();
  COUNTERS.forEach(function(c){if(c.f===id)ids.add(c.t);if(c.t===id)ids.add(c.f)});
  SYNERGIES.forEach(function(s){if(s.a===id)ids.add(s.b);if(s.b===id)ids.add(s.a)});
  ids.add(id);
  return ids;
}

function highlight(id){
  var conn=connectedIds(id);
  nodes.forEach(function(n){n.classList.toggle('dimmed',!conn.has(n.getAttribute('data-id')))});
  counterPaths.forEach(function(p){
    var f=p.getAttribute('data-from'),t=p.getAttribute('data-to');
    p.classList.toggle('dimmed',f!==id&&t!==id);
    p.classList.toggle('highlight',f===id||t===id);
  });
  synergyPaths.forEach(function(p){
    var a=p.getAttribute('data-a'),b=p.getAttribute('data-b');
    p.classList.toggle('dimmed',a!==id&&b!==id);
    p.classList.toggle('highlight',a===id||b===id);
  });
}

function clearHighlight(){
  nodes.forEach(function(n){n.classList.remove('dimmed','active')});
  counterPaths.forEach(function(p){p.classList.remove('dimmed','highlight')});
  synergyPaths.forEach(function(p){p.classList.remove('dimmed','highlight')});
}

function showPanel(id){
  var d=DATA[id];if(!d)return;
  var html='<h2 style="color:'+d.c+'">'+d.e+' '+d.n+'</h2>';
  html+='<div class="role">'+d.role+'</div>';
  html+='<div class="desc">'+d.desc+'</div>';
  html+='<div class="connections"><strong>Conexiones:</strong>';
  COUNTERS.forEach(function(c){
    if(c.f===id)html+='<div class="conn-item"><span class="conn-counter">⚔️ Counters:</span> '+DATA[c.t].e+' '+DATA[c.t].n+' — '+c.l+'</div>';
    if(c.t===id&&c.f!==id)html+='<div class="conn-item"><span class="conn-counter">🛡️ Countered by:</span> '+DATA[c.f].e+' '+DATA[c.f].n+' — '+c.l+'</div>';
  });
  SYNERGIES.forEach(function(s){
    var other=s.a===id?s.b:s.b===id?s.a:null;
    if(other)html+='<div class="conn-item"><span class="conn-synergy">✨ Sinergia:</span> '+DATA[other].e+' '+DATA[other].n+' — '+s.l+'</div>';
  });
  html+='</div>';
  panel.innerHTML=html;
  panel.classList.add('open');
}

nodes.forEach(function(n){
  n.addEventListener('mouseenter',function(){if(!activeId)highlight(n.getAttribute('data-id'))});
  n.addEventListener('mouseleave',function(){if(!activeId)clearHighlight()});
  n.addEventListener('click',function(e){
    e.stopPropagation();
    var id=n.getAttribute('data-id');
    if(activeId===id){activeId=null;clearHighlight();panel.classList.remove('open');return}
    activeId=id;
    clearHighlight();
    highlight(id);
    n.classList.add('active');
    showPanel(id);
  });
});

document.addEventListener('click',function(e){
  if(!e.target.closest('.node-group')&&!e.target.closest('#detail-panel')){
    activeId=null;clearHighlight();panel.classList.remove('open');
  }
});
})();
</script>
</body>
</html>
